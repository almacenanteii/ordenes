<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Órdenes de Trabajo 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap');
  :root {
    --orange:#E8671A; --g9:#1A1A1A; --g8:#2C2C2C; --g7:#3D3D3D;
    --g6:#5A5A5A; --g4:#9A9A9A; --g2:#E8E8E8; --g1:#F5F5F5;
    --white:#FFFFFF; --green:#2ECC71; --red:#E74C3C; --yellow:#F39C12;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Barlow',sans-serif; background:var(--g1); color:var(--g9); min-height:100vh; max-width:480px; margin:0 auto; }

  .hdr { background:var(--g9); padding:20px 16px 18px; position:relative; overflow:hidden; }
  .hdr::before { content:''; position:absolute; top:-30px; right:-30px; width:130px; height:130px; border-radius:50%; background:var(--orange); opacity:.10; }
  .hdr-lbl { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--orange); margin-bottom:3px; }
  .hdr-title { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800; color:var(--white); line-height:1.1; }
  .hdr-sub { font-size:12px; color:var(--g4); margin-top:3px; }

  .upd { text-align:center; padding:5px; font-size:10px; color:var(--g4); background:var(--g8); letter-spacing:.5px; }
  .upd strong { color:var(--orange); }

  /* FILTROS */
  .filtros { padding:12px 16px; background:var(--white); border-bottom:1px solid var(--g2); display:flex; flex-direction:column; gap:10px; }
  .filter-row { display:flex; gap:8px; align-items:center; }
  .filter-label { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--g4); white-space:nowrap; min-width:52px; }

  /* Desplegable semana */
  .sem-select-wrap { flex:1; position:relative; }
  .sem-select { width:100%; background:var(--g1); border:1.5px solid var(--g2); border-radius:10px; padding:8px 32px 8px 12px; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; color:var(--g9); appearance:none; cursor:pointer; }
  .sem-select:focus { outline:none; border-color:var(--orange); }
  .sem-select-wrap::after { content:'▾'; position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--orange); font-size:14px; pointer-events:none; }

  /* Estado */
  .estado-wrap { display:flex; gap:6px; flex:1; }
  .est-btn { flex:1; background:var(--g1); border:1.5px solid var(--g2); border-radius:8px; padding:7px 6px; font-size:12px; font-weight:600; color:var(--g6); cursor:pointer; text-align:center; transition:all .15s; }
  .est-btn.active-todos     { background:var(--orange); border-color:var(--orange); color:var(--white); }
  .est-btn.active-surtido   { background:#e8f8f0; border-color:var(--green); color:#1a8a50; }
  .est-btn.active-pendiente { background:#fff3f3; border-color:var(--red); color:var(--red); }

  /* RESUMEN */
  .resumen { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; padding:12px 16px; background:var(--white); border-bottom:1px solid var(--g2); }
  .res-card { text-align:center; padding:8px 4px; border-radius:10px; }
  .res-card.total     { background:var(--g1); }
  .res-card.surtido   { background:#e8f8f0; }
  .res-card.pendiente { background:#fff3f3; }
  .res-num { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:800; line-height:1; }
  .res-card.total     .res-num { color:var(--orange); }
  .res-card.surtido   .res-num { color:#1a8a50; }
  .res-card.pendiente .res-num { color:var(--red); }
  .res-lbl { font-size:10px; font-weight:600; color:var(--g4); margin-top:3px; text-transform:uppercase; letter-spacing:.5px; }

  /* LISTA */
  .lista { padding:12px 16px; display:flex; flex-direction:column; gap:10px; }

  .op-card { background:var(--white); border-radius:14px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.07); border-left:4px solid var(--g2); }
  .op-card.surtido  { border-left-color:var(--green); }
  .op-card.pendiente{ border-left-color:var(--red); }

  .op-top { display:flex; justify-content:space-between; align-items:flex-start; padding:11px 14px 6px; }
  .op-num { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:800; color:var(--g9); }
  .op-fecha { font-size:10px; color:var(--g4); margin-top:2px; }
  .op-badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
  .op-badge.surtido   { background:#e8f8f0; color:#1a8a50; }
  .op-badge.pendiente { background:#fff3f3; color:var(--red); }

  .op-producto { padding:0 14px 8px; font-size:12px; font-weight:500; color:var(--g7); line-height:1.4; }
  .op-codigo { font-size:10px; color:var(--orange); font-weight:600; margin-bottom:3px; }

  .op-grid { display:grid; grid-template-columns:1fr 1fr; border-top:1px solid var(--g1); }
  .op-field { padding:7px 14px; border-right:1px solid var(--g1); border-bottom:1px solid var(--g1); }
  .op-field:nth-child(even) { border-right:none; }
  .op-field:nth-last-child(-n+2) { border-bottom:none; }
  .op-field-lbl { font-size:9px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--g4); margin-bottom:2px; }
  .op-field-val { font-size:12px; font-weight:600; color:var(--g7); }
  .op-field-val.ok   { color:var(--green); }
  .op-field-val.late { color:var(--red); }
  .op-field-val.warn { color:var(--yellow); }
  .op-field-val.em   { color:var(--g4); }

  /* BOTÓN SURTIR */
  .btn-surtir { width:calc(100% - 28px); margin:10px 14px; background:var(--orange); color:var(--white); border:none; border-radius:10px; padding:10px; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:.5px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:background .15s; }
  .btn-surtir:active { background:var(--orange-dark, #c4530e); }
  .btn-surtir:disabled { background:var(--g4); cursor:default; }

  /* MODAL */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; align-items:flex-end; justify-content:center; }
  .modal-bg.open { display:flex; }
  .modal { background:var(--white); border-radius:20px 20px 0 0; padding:24px 20px 32px; width:100%; max-width:480px; }
  .modal-title { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:800; color:var(--g9); margin-bottom:4px; }
  .modal-op { font-size:13px; color:var(--orange); font-weight:600; margin-bottom:16px; }
  .modal-label { font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--g4); margin-bottom:8px; display:block; }
  .modal-options { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
  .surtidor-btn { background:var(--g1); border:2px solid var(--g2); border-radius:12px; padding:12px 8px; text-align:center; cursor:pointer; transition:all .15s; }
  .surtidor-btn .s-icon { font-size:24px; margin-bottom:4px; }
  .surtidor-btn .s-name { font-size:13px; font-weight:700; color:var(--g7); }
  .surtidor-btn.selected { border-color:var(--orange); background:#fff8f4; }
  .surtidor-btn.selected .s-name { color:var(--orange); }
  .modal-confirm { width:100%; background:var(--orange); color:var(--white); border:none; border-radius:12px; padding:14px; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; cursor:pointer; }
  .modal-confirm:disabled { background:var(--g4); cursor:default; }
  .modal-cancel { width:100%; background:none; border:none; color:var(--g4); font-size:13px; padding:10px; cursor:pointer; margin-top:4px; }
  .modal-msg { text-align:center; padding:12px; border-radius:10px; font-size:13px; font-weight:600; margin-top:12px; display:none; }
  .modal-msg.ok  { background:#e8f8f0; color:#1a8a50; }
  .modal-msg.err { background:#fff3f3; color:var(--red); }

  /* MISC */
  .loading { text-align:center; padding:40px 20px; color:var(--g4); font-size:13px; }
  .spinner { width:28px; height:28px; border:3px solid var(--g2); border-top-color:var(--orange); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
  .spinner-sm { width:16px; height:16px; border:2px solid rgba(255,255,255,.4); border-top-color:var(--white); border-radius:50%; animation:spin .8s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .empty { text-align:center; padding:30px 20px; color:var(--g4); font-size:13px; }
  .empty-ico { font-size:32px; margin-bottom:8px; }
  .err-box { background:#fff3f3; border:1px solid #fcc; border-radius:10px; padding:14px; margin:16px; font-size:12px; color:var(--red); text-align:center; line-height:1.6; }
  .footer { text-align:center; padding:16px; font-size:10px; color:var(--g4); letter-spacing:.5px; }
  .footer strong { color:var(--orange); }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-lbl">Almacén SAI · 2026</div>
  <div class="hdr-title">Órdenes de Trabajo</div>
  <div class="hdr-sub">Trazabilidad de OPs por semana</div>
</div>

<div class="upd" id="upd">Cargando datos...</div>

<div class="filtros">
  <div class="filter-row">
    <div class="filter-label">Semana</div>
    <div class="sem-select-wrap">
      <select class="sem-select" id="sem-select" onchange="setSemana(this.value)">
        <option value="todas">Todas las semanas</option>
      </select>
    </div>
  </div>
  <div class="filter-row">
    <div class="filter-label">Estado</div>
    <div class="estado-wrap">
      <button class="est-btn active-todos"   id="est-todos"     onclick="setEstado('todos')">Todos</button>
      <button class="est-btn"                id="est-surtido"   onclick="setEstado('Surtido')">✓ Surtido</button>
      <button class="est-btn"                id="est-pendiente" onclick="setEstado('Pendiente')">⏳ Pendiente</button>
    </div>
  </div>
</div>

<div class="resumen">
  <div class="res-card total">
    <div class="res-num" id="r-total">0</div>
    <div class="res-lbl">Total OPs</div>
  </div>
  <div class="res-card surtido">
    <div class="res-num" id="r-surtido">0</div>
    <div class="res-lbl">Surtidas</div>
  </div>
  <div class="res-card pendiente">
    <div class="res-num" id="r-pendiente">0</div>
    <div class="res-lbl">Pendientes</div>
  </div>
</div>

<div class="lista" id="lista">
  <div class="loading"><div class="spinner"></div>Cargando órdenes...</div>
</div>

<div class="footer">Actualizado por <strong>Almacén SAI</strong> · 2026</div>

<!-- MODAL SURTIR -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title">Marcar como Surtido</div>
    <div class="modal-op" id="modal-op-info"></div>
    <label class="modal-label">¿Quién surtió?</label>
    <div class="modal-options">
      <div class="surtidor-btn" id="btn-lupita" onclick="selectSurtidor('Lupita Alferez')">
        <div class="s-icon">👩</div>
        <div class="s-name">Lupita Alferez</div>
      </div>
      <div class="surtidor-btn" id="btn-marco" onclick="selectSurtidor('Marco Reyes')">
        <div class="s-icon">👨</div>
        <div class="s-name">Marco Reyes</div>
      </div>
    </div>
    <button class="modal-confirm" id="modal-confirm" disabled onclick="confirmarSurtido()">
      Confirmar Surtido
    </button>
    <button class="modal-cancel" onclick="cerrarModal()">Cancelar</button>
    <div class="modal-msg" id="modal-msg"></div>
  </div>
</div>

<script>
// ⚠️ REEMPLAZA esta URL con la que te da Google Apps Script al implementar
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzUIlRNyx-hijs5MoJQ5fxyrWYMRfl9TB5C1qwcyo1b4_GFVZqB1wmCVnZMhyikw-A/exec';

const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSRVxK0x8kXSP4QmReaMT52vBR71mHfpsmH8aShvklRSa13FU5evETPDJ7Pi4VtFHAxFLN6Ip_rBCEJ/pub?gid=1977206980&single=true&output=csv';

let allData = [];
let semanaActual = 'todas';
let estadoActual = 'todos';
let opSeleccionada = null;
let surtidorSeleccionado = null;

function parseCSV(txt) {
  const rows = [];
  let row = [], cur = '', q = false;
  for (let i = 0; i < txt.length; i++) {
    const c = txt[i];
    if (c === '"') { q = !q; }
    else if (c === ',' && !q) { row.push(cur.trim()); cur = ''; }
    else if ((c === '\n' || c === '\r') && !q) {
      if (c === '\r' && txt[i+1] === '\n') i++;
      row.push(cur.trim()); cur = '';
      if (row.some(x => x)) rows.push(row);
      row = [];
    } else { cur += c; }
  }
  if (cur || row.length) { row.push(cur.trim()); if (row.some(x=>x)) rows.push(row); }
  return rows;
}

function cl(v) {
  if (v === undefined || v === null) return '';
  return String(v).trim().replace(/^nan$/i, '');
}

function fmtFecha(v) {
  const s = cl(v); if (!s) return '—';
  const match = s.match(/^(\d+)\/(\d+)\/(\d+)/);
  if (!match) return s;
  const meses = ['','ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${match[1].padStart(2,'0')} ${meses[parseInt(match[2])]||match[2]} ${match[3]}`;
}

function fmtATiempo(v) {
  const s = cl(v); if (!s) return { txt:'—', cls:'em' };
  const n = parseFloat(s);
  if (isNaN(n)) return { txt:s, cls:'' };
  if (n <= 0) return { txt:'✓ A tiempo', cls:'ok' };
  if (n <= 3) return { txt:`+${Math.round(n)} días`, cls:'warn' };
  return { txt:`+${Math.round(n)} días tarde`, cls:'late' };
}

function setSemana(val) {
  semanaActual = val;
  renderLista();
}

function setEstado(est) {
  estadoActual = est;
  ['todos','surtido','pendiente'].forEach(e => {
    document.getElementById('est-'+e).className = 'est-btn';
  });
  if (est === 'todos')     document.getElementById('est-todos').classList.add('active-todos');
  if (est === 'Surtido')   document.getElementById('est-surtido').classList.add('active-surtido');
  if (est === 'Pendiente') document.getElementById('est-pendiente').classList.add('active-pendiente');
  renderLista();
}

function abrirModal(op) {
  opSeleccionada = op;
  surtidorSeleccionado = null;
  document.getElementById('modal-op-info').textContent = `OP ${op.op} · ${op.producto}`;
  document.getElementById('btn-lupita').classList.remove('selected');
  document.getElementById('btn-marco').classList.remove('selected');
  document.getElementById('modal-confirm').disabled = true;
  document.getElementById('modal-msg').style.display = 'none';
  document.getElementById('modal-bg').classList.add('open');
}

function cerrarModal() {
  document.getElementById('modal-bg').classList.remove('open');
  opSeleccionada = null;
  surtidorSeleccionado = null;
}

function selectSurtidor(nombre) {
  surtidorSeleccionado = nombre;
  document.getElementById('btn-lupita').classList.toggle('selected', nombre === 'Lupita Alferez');
  document.getElementById('btn-marco').classList.toggle('selected', nombre === 'Marco Reyes');
  document.getElementById('modal-confirm').disabled = false;
}

async function confirmarSurtido() {
  if (!opSeleccionada || !surtidorSeleccionado) return;

  const btn = document.getElementById('modal-confirm');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner-sm"></div> Guardando...';

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ op: opSeleccionada.op, surtio: surtidorSeleccionado }),
    });
    const data = await res.json();

    const msg = document.getElementById('modal-msg');
    msg.style.display = 'block';

    if (data.ok) {
      msg.className = 'modal-msg ok';
      msg.textContent = '✓ ' + data.msg;
      // Actualizar localmente
      const item = allData.find(r => r.op === opSeleccionada.op);
      if (item) {
        item.estado = 'Surtido';
        item.surtio = surtidorSeleccionado;
        item.fechasurtido = new Date().toLocaleDateString('es-MX');
      }
      setTimeout(() => { cerrarModal(); renderLista(); }, 1500);
    } else {
      msg.className = 'modal-msg err';
      msg.textContent = '⚠️ ' + data.msg;
      btn.disabled = false;
      btn.innerHTML = 'Confirmar Surtido';
    }
  } catch(e) {
    const msg = document.getElementById('modal-msg');
    msg.style.display = 'block';
    msg.className = 'modal-msg err';
    msg.textContent = '⚠️ Error de conexión';
    btn.disabled = false;
    btn.innerHTML = 'Confirmar Surtido';
  }
}

function renderLista() {
  let filtered = allData;
  if (semanaActual !== 'todas') filtered = filtered.filter(r => r.semana === semanaActual);
  if (estadoActual !== 'todos') filtered = filtered.filter(r => r.estado === estadoActual);

  const surtidas   = filtered.filter(r => r.estado === 'Surtido').length;
  const pendientes = filtered.filter(r => r.estado === 'Pendiente').length;
  document.getElementById('r-total').textContent    = filtered.length;
  document.getElementById('r-surtido').textContent  = surtidas;
  document.getElementById('r-pendiente').textContent = pendientes;

  const lista = document.getElementById('lista');
  if (!filtered.length) {
    lista.innerHTML = `<div class="empty"><div class="empty-ico">📭</div>No hay órdenes para este filtro</div>`;
    return;
  }

  lista.innerHTML = filtered.map(r => {
    const at = fmtATiempo(r.atiempo);
    const esPendiente = (r.estado || '').toLowerCase() !== 'surtido';
    const estadoCls = esPendiente ? 'pendiente' : 'surtido';
    const badgeTxt  = esPendiente ? '⏳ Pendiente' : '✓ Surtido';

    return `<div class="op-card ${estadoCls}">
      <div class="op-top">
        <div>
          <div class="op-num">OP ${r.op}</div>
          <div class="op-fecha">${fmtFecha(r.fecha)}</div>
        </div>
        <div class="op-badge ${estadoCls}">${badgeTxt}</div>
      </div>
      <div class="op-producto">
        <div class="op-codigo">${r.codigo || '—'}</div>
        ${r.producto || '—'}
      </div>
      <div class="op-grid">
        <div class="op-field">
          <div class="op-field-lbl">Surtió</div>
          <div class="op-field-val ${r.surtio ? '' : 'em'}">${r.surtio || 'Sin asignar'}</div>
        </div>
        <div class="op-field">
          <div class="op-field-lbl">Semana</div>
          <div class="op-field-val">${r.semana || '—'}</div>
        </div>
        <div class="op-field">
          <div class="op-field-lbl">Fecha surtido</div>
          <div class="op-field-val ${r.fechasurtido ? '' : 'em'}">${fmtFecha(r.fechasurtido) || '—'}</div>
        </div>
        <div class="op-field">
          <div class="op-field-lbl">A tiempo</div>
          <div class="op-field-val ${at.cls}">${at.txt}</div>
        </div>
      </div>
      ${esPendiente ? `<button class="btn-surtir" onclick="abrirModal(${JSON.stringify(r).replace(/"/g,'&quot;')})">📦 Marcar como Surtido</button>` : ''}
    </div>`;
  }).join('');
}

async function load() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('No se pudo conectar');
    const txt = await res.text();
    const rows = parseCSV(txt);
    const headers = rows[0].map(h => cl(h).toLowerCase());

    const idx = {
      op:          headers.indexOf('op'),
      fecha:       headers.indexOf('fecha'),
      codigo:      headers.indexOf('codigo'),
      producto:    headers.indexOf('producto'),
      prioridad:   headers.indexOf('prioridad'),
      surtio:      headers.indexOf('surtio'),
      estado:      headers.indexOf('estado'),
      fechasurtido:headers.indexOf('fecha de sutido'),
      atiempo:     headers.indexOf('a tiempo'),
      semana:      headers.indexOf('semana'),
    };

    allData = rows.slice(1).map(r => ({
      op:          cl(r[idx.op]),
      fecha:       cl(r[idx.fecha]),
      codigo:      cl(r[idx.codigo]),
      producto:    cl(r[idx.producto]),
      prioridad:   cl(r[idx.prioridad]),
      surtio:      cl(r[idx.surtio]),
      estado:      cl(r[idx.estado]),
      fechasurtido:cl(r[idx.fechasurtido]),
      atiempo:     cl(r[idx.atiempo]),
      semana:      cl(r[idx.semana]),
    })).filter(r => r.op);

    // Semanas únicas ordenadas → desplegable
    const semanas = [...new Set(allData.map(r => r.semana).filter(s => s))]
      .sort((a,b) => Number(a) - Number(b));

    const sel = document.getElementById('sem-select');
    semanas.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = `Semana ${s}`;
      sel.appendChild(opt);
    });

    // Abrir en la semana más reciente
    const ultima = semanas[semanas.length - 1];
    if (ultima) {
      sel.value = ultima;
      semanaActual = ultima;
    }
    renderLista();

    const now = new Date();
    document.getElementById('upd').innerHTML = `Datos al <strong>${now.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'})}</strong> · ${now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}`;

  } catch(e) {
    document.getElementById('lista').innerHTML = `<div class="err-box">⚠️ Error al cargar datos<br><small>${e.message}</small></div>`;
    document.getElementById('upd').textContent = 'Error al conectar';
    console.error(e);
  }
}

// Cerrar modal al tocar fuera
document.getElementById('modal-bg').addEventListener('click', function(e) {
  if (e.target === this) cerrarModal();
});

load();
</script>
</body>
</html>
